[app]
name = "apple-health"
version = "0.1.0"
description = "Ingests Apple Health data from Health Auto Export and provides a dashboard"

[runtime.container]
image = "Dockerfile"
port = 8080

[routing]
health_check = "/health"
public_paths = ["/api/data"]

[resources]
memory_mb = 512
cpu_millicores = 500

[data]
sqlite = ["health"]

[[services.v2.provides]]
service = "github.com/imbue-openhost/health-data-service-spec"
version = "0.1.0"
endpoint = "/api/"
